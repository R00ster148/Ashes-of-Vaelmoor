<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashes of Vaelmoor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap');

:root{
  --bg:#15110f;
  --bg-deep:#0f0c0a;
  --panel:#221c18;
  --panel-light:#2b231e;
  --border:#473a30;
  --text:#ddd0bc;
  --text-dim:#9a8a76;
  --ember:#cf5b2e;
  --ember-glow:rgba(207,91,46,0.35);
  --gold:#c79a47;
  --blood:#8a3232;
  --corrupt:#7a4ea3;
  --corrupt-deep:#3a2150;
}

*{box-sizing:border-box;}

html,body{margin:0;padding:0;}

body{
  background:
    radial-gradient(ellipse at top, rgba(207,91,46,0.06), transparent 60%),
    var(--bg-deep);
  color:var(--text);
  font-family:'EB Garamond', serif;
  font-size:17px;
  line-height:1.5;
  min-height:100vh;
}

h1,h2,h3,.label,.btn,.title{
  font-family:'Cinzel', serif;
}

.mono{font-family:'JetBrains Mono', monospace;}

.app{
  max-width:1180px;
  margin:0 auto;
  padding:18px 18px 60px;
}

/* ---------- Banner ---------- */
.banner{
  text-align:center;
  padding:22px 10px 16px;
  border-bottom:1px solid var(--border);
  margin-bottom:22px;
  position:relative;
}
.banner h1{
  margin:0;
  font-size:clamp(28px,5vw,46px);
  letter-spacing:0.12em;
  color:var(--text);
  text-shadow:0 0 18px var(--ember-glow);
}
.banner .sub{
  margin-top:8px;
  color:var(--text-dim);
  font-size:14px;
  letter-spacing:0.06em;
  text-transform:uppercase;
}
.banner .sub .turn{color:var(--gold);}

/* ---------- Layout ---------- */
.layout{
  display:grid;
  grid-template-columns:260px 1fr 300px;
  gap:18px;
  align-items:stretch;
  grid-template-areas:
    "ledger  event  realm"
    "quests  event  realm"
    "quests  actions realm"
    "activities activities realm"
    "chronicle chronicle chronicle";
}
@media (max-width:980px){
  .layout{
    grid-template-columns:1fr 1fr;
    grid-template-areas:
      "ledger  realm"
      "quests  realm"
      "event   event"
      "actions actions"
      "activities activities"
      "chronicle chronicle";
  }
}
@media (max-width:640px){
  .layout{
    grid-template-columns:1fr;
    grid-template-areas:
      "ledger"
      "realm"
      "quests"
      "event"
      "actions"
      "activities"
      "chronicle";
  }
}

.area-ledger{grid-area:ledger;}
.area-quests{grid-area:quests;}
.area-realm{grid-area:realm;}
.area-event{grid-area:event;}
.area-actions{grid-area:actions;}
.area-activities{grid-area:activities;}
.area-chronicle{grid-area:chronicle;}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  clip-path:polygon(0 10px,10px 0,calc(100% - 10px) 0,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0 calc(100% - 10px));
  padding:16px 18px;
}

.panel h2{
  margin:0 0 12px;
  font-size:14px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--gold);
  border-bottom:1px solid var(--border);
  padding-bottom:8px;
}

/* ---------- Ledger ---------- */
.stat-row{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:6px;
  font-size:14px;
}
.stat-row .stat-name{color:var(--text-dim); letter-spacing:0.08em; text-transform:uppercase; font-size:12px;}
.stat-row .stat-val{font-size:16px;}

.bar-track{
  height:7px;
  background:var(--bg-deep);
  border:1px solid var(--border);
  margin:4px 0 12px;
  overflow:hidden;
  position:relative;
}
.bar-fill{
  height:100%;
  transition:width .4s ease;
}
.bar-fill.faith{background:linear-gradient(90deg,#7a6a3a,var(--gold));}
.bar-fill.corruption{
  background:linear-gradient(90deg,var(--corrupt-deep),var(--corrupt),var(--blood));
  background-size:200% 100%;
  animation:corruptShift 6s linear infinite;
}
@keyframes corruptShift{
  0%{background-position:0% 0;}
  100%{background-position:200% 0;}
}

/* ---------- Territories ---------- */
#territories{
  max-height:520px;
  overflow-y:auto;
  padding-right:4px;
}
.territory-card{
  background:var(--panel-light);
  border:1px solid var(--border);
  clip-path:polygon(0 6px,6px 0,calc(100% - 6px) 0,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0 calc(100% - 6px));
  padding:10px 12px;
  margin-bottom:10px;
  font-size:13px;
}
.territory-card:last-child{margin-bottom:0;}
.territory-card .t-name{
  font-family:'Cinzel', serif;
  font-size:13px;
  letter-spacing:0.04em;
  color:var(--text);
}
.territory-card.conquered{
  border-color:var(--gold);
  box-shadow:0 0 10px rgba(199,154,71,0.18) inset;
}
.territory-card.conquered .t-name{color:var(--gold);}
.territory-card.locked{
  opacity:0.55;
}
.t-meta{
  display:flex;
  justify-content:space-between;
  color:var(--text-dim);
  font-size:11px;
  margin:3px 0 5px;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.t-desc{
  color:var(--text-dim);
  font-size:12px;
  font-style:italic;
}

/* ---------- Council / Event ---------- */
.event-card{
  border-left:3px solid var(--ember);
  box-shadow:0 0 22px -6px var(--ember-glow);
  position:relative;
}
.event-card .speaker{
  font-size:12px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--ember);
  margin-bottom:6px;
}
.event-card h3{
  margin:0 0 10px;
  font-size:20px;
  letter-spacing:0.05em;
  color:var(--text);
}
.event-text{
  margin:0 0 16px;
  color:var(--text);
}
.choice-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.choice-btn, .action-btn, .big-btn{
  font-family:'EB Garamond', serif;
  font-size:15px;
  text-align:left;
  background:var(--panel-light);
  border:1px solid var(--border);
  color:var(--text);
  padding:10px 14px;
  cursor:pointer;
  clip-path:polygon(0 6px,6px 0,calc(100% - 6px) 0,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0 calc(100% - 6px));
  transition:border-color .15s, color .15s, transform .1s;
}
.choice-btn:hover, .action-btn:hover:not(:disabled), .big-btn:hover{
  border-color:var(--ember);
  color:#fff;
}
.choice-btn:active, .action-btn:active, .big-btn:active{transform:scale(0.99);}
.action-btn:disabled{
  opacity:0.4;
  cursor:not-allowed;
}
.result-text{
  margin-top:14px;
  padding-top:14px;
  border-top:1px dashed var(--border);
  color:var(--text);
  font-style:italic;
}
.continue-wrap{margin-top:16px; text-align:right;}

/* ---------- Actions ---------- */
.actions-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
@media (max-width:480px){
  .actions-grid{grid-template-columns:1fr;}
}
.action-btn small{
  display:block;
  color:var(--text-dim);
  font-size:11px;
  margin-top:3px;
  text-transform:none;
  letter-spacing:0;
}
.target-row{
  display:flex;
  gap:8px;
  margin-top:4px;
  flex-wrap:wrap;
}
.target-row select{
  flex:1;
  background:var(--bg-deep);
  color:var(--text);
  border:1px solid var(--border);
  padding:8px;
  font-family:'EB Garamond', serif;
  font-size:14px;
}
.target-row .action-btn{
  flex:0 0 auto;
}
.gate-note{
  font-size:12px;
  color:var(--text-dim);
  font-style:italic;
  margin-top:6px;
}

/* ---------- Chronicle ---------- */
.chronicle{
  max-height:230px;
  overflow-y:auto;
  font-size:13px;
  color:var(--text-dim);
}
.chronicle .entry{
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.chronicle .entry:last-child{border-bottom:none;}
.chronicle .entry .turn-mark{
  color:var(--gold);
  font-family:'JetBrains Mono', monospace;
  margin-right:6px;
}

/* ---------- Overlay ---------- */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(8,6,5,0.92);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:50;
  padding:24px;
}
.overlay.hidden{display:none;}
.overlay-box{
  max-width:600px;
  background:var(--panel);
  border:1px solid var(--border);
  clip-path:polygon(0 14px,14px 0,calc(100% - 14px) 0,100% 14px,100% calc(100% - 14px),calc(100% - 14px) 100%,14px 100%,0 calc(100% - 14px));
  padding:28px 30px;
  box-shadow:0 0 60px -10px var(--ember-glow);
}
.overlay-box h2{
  margin:0 0 4px;
  font-size:26px;
  letter-spacing:0.1em;
  color:var(--gold);
  border:none;
  padding:0;
  text-transform:none;
}
.overlay-box .eyebrow{
  font-size:12px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--ember);
  margin-bottom:6px;
}
.overlay-box p{margin:14px 0; color:var(--text);}
.overlay-box .big-btn{
  margin-top:10px;
  display:inline-block;
}

/* ---------- Banner actions / Glossary ---------- */
.banner-actions{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:14px;
}
.glossary-btn{
  font-family:'Cinzel', serif;
  font-size:12px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--gold);
  padding:8px 16px;
  cursor:pointer;
  clip-path:polygon(0 6px,6px 0,calc(100% - 6px) 0,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0 calc(100% - 6px));
  transition:border-color .15s, color .15s;
}
.glossary-btn:hover{
  border-color:var(--ember);
  color:#fff;
}

.glossary-box{
  max-width:640px;
  width:100%;
  max-height:80vh;
  display:flex;
  flex-direction:column;
}
.glossary-box h2{
  margin:0 0 4px;
  font-size:24px;
  letter-spacing:0.1em;
  color:var(--gold);
  border:none;
  padding:0;
  text-transform:none;
}
.glossary-search{
  width:100%;
  margin:14px 0 12px;
  background:var(--bg-deep);
  color:var(--text);
  border:1px solid var(--border);
  padding:10px 12px;
  font-family:'EB Garamond', serif;
  font-size:15px;
}
.glossary-search:focus{
  outline:none;
  border-color:var(--ember);
}
.glossary-list{
  overflow-y:auto;
  flex:1;
  padding-right:4px;
}
.glossary-item{
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.glossary-item:last-child{border-bottom:none;}
.glossary-term{
  font-family:'Cinzel', serif;
  font-size:14px;
  letter-spacing:0.06em;
  color:var(--ember);
  margin-bottom:3px;
}
.glossary-def{
  font-size:14px;
  color:var(--text);
}
.glossary-empty{
  color:var(--text-dim);
  font-style:italic;
  text-align:center;
  padding:20px 0;
}
.glossary-close-row{
  text-align:right;
  margin-top:14px;
}

/* ---------- Quest panel ---------- */
.quest-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.quest-item{
  font-size:13px;
  padding:8px 10px;
  background:var(--panel-light);
  border:1px solid var(--border);
  clip-path:polygon(0 6px,6px 0,calc(100% - 6px) 0,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0 calc(100% - 6px));
}
.quest-item .quest-label{
  display:block;
  color:var(--text);
}
.quest-item.done{
  border-color:var(--gold);
}
.quest-item.done .quest-label{
  color:var(--text-dim);
  text-decoration:line-through;
}
.quest-item.main{
  border-left:3px solid var(--ember);
}
.quest-item.warning{
  border-left:3px solid var(--corrupt);
}
.quest-item.warning .quest-label{
  color:var(--text);
}
.quest-sub{
  display:block;
  margin-top:3px;
  color:var(--text-dim);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.06em;
}

/* ---------- Character sigil / speaker badge ---------- */
.speaker-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:6px;
}
.speaker-sigil{
  width:34px;
  height:34px;
  flex:0 0 auto;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  background:var(--bg-deep);
  border:1px solid var(--char-color, var(--border));
  box-shadow:0 0 10px -2px var(--char-color, transparent);
}
.speaker-meta{
  display:flex;
  flex-direction:column;
  line-height:1.2;
}
.speaker-name{
  font-size:12px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--char-color, var(--ember));
}
.speaker-role{
  font-size:11px;
  color:var(--text-dim);
  font-style:italic;
}

/* ---------- Territory sigil ---------- */
.t-name-row{
  display:flex;
  align-items:center;
  gap:8px;
}
.t-sigil{font-size:15px;}

/* ---------- Travel sequence ---------- */
.travel-box{
  max-width:640px;
  width:100%;
}
.travel-box h2{
  margin:0 0 4px;
  font-size:22px;
  letter-spacing:0.08em;
  color:var(--gold);
  border:none;
  padding:0;
  text-transform:none;
}
.travel-meta{
  font-size:12px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--ember);
  margin-bottom:14px;
}
.travel-progress-track{
  height:10px;
  background:var(--bg-deep);
  border:1px solid var(--border);
  margin:10px 0 18px;
  overflow:hidden;
  position:relative;
}
.travel-progress-fill{
  height:100%;
  background:linear-gradient(90deg,#7a4a2a,var(--ember),var(--gold));
  background-size:200% 100%;
  animation:corruptShift 4s linear infinite;
  transition:width .5s ease;
}
.travel-days-label{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--text-dim);
  text-transform:uppercase;
  letter-spacing:0.06em;
  margin-top:-12px;
  margin-bottom:14px;
}
.travel-text{
  margin:0 0 16px;
  color:var(--text);
}
.travel-result{
  margin:14px 0;
  padding:12px 14px;
  background:var(--panel-light);
  border-left:3px solid var(--ember);
  font-style:italic;
  font-size:14px;
}

/* ---------- Side activities ---------- */
.activity-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
@media (max-width:480px){
  .activity-grid{grid-template-columns:1fr;}
}
.activity-card{
  background:var(--panel-light);
  border:1px solid var(--border);
  clip-path:polygon(0 6px,6px 0,calc(100% - 6px) 0,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0 calc(100% - 6px));
  padding:10px 12px;
  cursor:pointer;
  transition:border-color .15s;
  text-align:left;
  font-family:'EB Garamond', serif;
  color:var(--text);
}
.activity-card:hover{border-color:var(--ember);}
.activity-card .activity-title{
  font-family:'Cinzel', serif;
  font-size:13px;
  letter-spacing:0.04em;
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:4px;
}
.activity-card .activity-desc{
  font-size:12px;
  color:var(--text-dim);
  font-style:italic;
}
</style>
</head>
<body>
<div class="app">
  <div class="banner">
    <h1>Ashes of Vaelmoor</h1>
    <div class="sub">Turn <span class="turn mono" id="turnNum">1</span> — Reign of the Last Ashveil</div>
    <div class="banner-actions">
      <button class="glossary-btn" id="glossaryBtn">Glossary &amp; Word Search</button>
    </div>
  </div>

  <div class="layout">
    <div class="panel area-quests">
      <h2>Your Quests</h2>
      <div class="quest-list" id="questList"></div>
    </div>

    <div class="panel area-ledger">
      <h2>The Ledger</h2>
      <div class="stat-row"><span class="stat-name">Gold</span><span class="stat-val mono" id="goldVal">0</span></div>
      <div class="stat-row"><span class="stat-name">Grain</span><span class="stat-val mono" id="grainVal">0</span></div>
      <div class="stat-row"><span class="stat-name">Soldiers</span><span class="stat-val mono" id="soldiersVal">0</span></div>

      <div class="stat-row"><span class="stat-name">Faith</span><span class="stat-val mono" id="faithVal">0</span></div>
      <div class="bar-track"><div class="bar-fill faith" id="faithBar" style="width:0%"></div></div>

      <div class="stat-row"><span class="stat-name">Corruption</span><span class="stat-val mono" id="corruptionVal">0</span></div>
      <div class="bar-track"><div class="bar-fill corruption" id="corruptionBar" style="width:0%"></div></div>
    </div>

    <div class="panel area-realm">
      <h2>The Realm</h2>
      <div id="territories"></div>
    </div>

    <div class="panel event-card area-event" id="eventCard"></div>

    <div class="panel area-actions" id="actionsPanel" style="display:none;">
      <h2>The Council Awaits Your Word</h2>
      <div class="actions-grid" id="actionsGrid"></div>
    </div>

    <div class="panel area-activities" id="activitiesPanel" style="display:none;">
      <h2>Around Ashveil Hold</h2>
      <div class="activity-grid" id="activityGrid"></div>
    </div>

    <div class="panel area-chronicle">
      <h2>The Chronicle</h2>
      <div class="chronicle" id="chronicle"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box" id="overlayBox"></div>
</div>

<div class="overlay hidden" id="glossaryOverlay">
  <div class="overlay-box glossary-box">
    <h2>Glossary &amp; Word Search</h2>
    <input type="text" class="glossary-search" id="glossarySearch" placeholder="Search for a word, e.g. 'corruption', 'parley', 'garrison'...">
    <div class="glossary-list" id="glossaryList"></div>
    <div class="glossary-close-row">
      <button class="big-btn" id="glossaryCloseBtn">Close</button>
    </div>
  </div>
</div>

<div class="overlay hidden" id="travelOverlay">
  <div class="overlay-box travel-box" id="travelBox"></div>
</div>

<script>
/* =====================================================
   ASHES OF VAELMOOR — data
   ===================================================== */

const TERRITORY_DATA = [
  {id:'dunmar', name:'Dunmar Reach', owner:'Hollow Garrison', garrison:8, goldInc:3, grainInc:14, sigil:'🌾', travelDays:2,
   desc:"Once the breadbasket of Vaelmoor, its fields are ploughed by thralls beneath a sky the colour of a bruise."},
  {id:'greywood', name:'The Greywood', owner:'Bandit Lords', garrison:6, goldInc:5, grainInc:4, sigil:'🌲', travelDays:2,
   desc:"An ancient forest where outlaw kings hold court beneath trees older than the kingdom itself."},
  {id:'coldspire', name:'Coldspire Pass', owner:'The Free Company', garrison:10, goldInc:9, grainInc:0, sigil:'⛰️', travelDays:3,
   desc:"A mountain choke-point held by mercenaries loyal only to coin."},
  {id:'saltmere', name:'Saltmere Harbor', owner:'The Drowned Fleet', garrison:7, goldInc:12, grainInc:2, sigil:'⚓', travelDays:3,
   desc:"A pirate haven where black-sailed ships ride at anchor in the fog."},
  {id:'brackenfort', name:'Brackenfort', owner:'Duke Mavros', garrison:12, goldInc:6, grainInc:6, sigil:'🏰', travelDays:2,
   desc:"A grim stone keep, seat of the rival who would call himself king."},
  {id:'marsh', name:'The Sunken Marsh', owner:'The Marsh-Mothers', garrison:9, goldInc:1, grainInc:0, sigil:'🐍', travelDays:4,
   desc:"A drowned forest where cultists of the Unmaker whisper to things beneath the water."},
  {id:'emberwastes', name:'The Ember Wastes', owner:'The Hollow King', garrison:22, goldInc:0, grainInc:0, sigil:'🔥', travelDays:5,
   desc:"The ruin of the capital, where the throne still burns with a fire that gives no warmth.", final:true}
];

const CHARACTERS = {
  korrath:{name:'General Thessa Korrath', role:'Master of War', sigil:'⚔️', color:'#8a3232', desc:"A scarred veteran who has buried more friends than she's made, and trusts steel more than words."},

function charFor(speaker){
  if(!speaker) return CHARACTERS.player;
  const s=speaker.toLowerCase();
  if(s.includes('korrath')) return CHARACTERS.korrath;
  if(s.includes('seris')) return CHARACTERS.seris;
  if(s.includes('ilun')) return CHARACTERS.ilun;
  if(s.includes('???') || s.includes('unmaker') || s.includes('hearth')) return CHARACTERS.unmaker;
  return {name:speaker, role:'', sigil:'📜', color:'#9a8a76'};
}

/* =====================================================
   STATE
   ===================================================== */

let state;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function genericEventIds(){
  return EVENTS.filter(e=>e.category==='generic').map(e=>e.id);
}

function freshState(){
  return {
    turn:1,
    gold:40,
    grain:35,
    soldiers:25,
    faith:60,
    corruption:8,
    territories:TERRITORY_DATA.map(t=>({...t, conquered:false})),
    log:[],
    flags:{},
    priorityQueue:[],
    seen:new Set(),
    eventPool:shuffle(genericEventIds()),
    currentEvent:null,
    phase:'event',
    ended:false
  };
}

function clampAll(){
  state.gold=Math.max(0,Math.round(state.gold));
  state.grain=Math.max(0,Math.round(state.grain));
  state.soldiers=Math.max(0,Math.round(state.soldiers));
  state.faith=Math.max(0,Math.min(100,Math.round(state.faith)));
  state.corruption=Math.max(0,Math.min(100,Math.round(state.corruption)));
}

function addLog(text){
  state.log.unshift({turn:state.turn, text});
}

/* =====================================================
   RENDER
   ===================================================== */

function render(){
  document.getElementById('turnNum').textContent=state.turn;
  document.getElementById('goldVal').textContent=state.gold;
  document.getElementById('grainVal').textContent=state.grain;
  document.getElementById('soldiersVal').textContent=state.soldiers;
  document.getElementById('faithVal').textContent=state.faith;
  document.getElementById('corruptionVal').textContent=state.corruption;
  document.getElementById('faithBar').style.width=state.faith+'%';
  document.getElementById('corruptionBar').style.width=state.corruption+'%';

  renderTerritories();
  renderQuests();

  const eventPanel=document.getElementById('eventCard');
  const actionsPanel=document.getElementById('actionsPanel');

  if(state.phase==='event'){
    actionsPanel.style.display='none';
    document.getElementById('activitiesPanel').style.display='none';
    renderEvent();
  } else {
    renderResolvedEvent();
    actionsPanel.style.display='block';
    document.getElementById('activitiesPanel').style.display='block';
    renderActions();
    renderActivities();
  }

  renderChronicle();
}

function conqueredCount(){
  return state.territories.filter(t=>t.conquered && !t.final).length;
}

function renderTerritories(){
  const el=document.getElementById('territories');
  const need=4;
  const unlocked=conqueredCount()>=need;
  el.innerHTML=state.territories.map(t=>{
    const cls=['territory-card'];
    if(t.conquered) cls.push('conquered');
    if(t.final && !unlocked) cls.push('locked');
    const status = t.conquered ? 'Held by you' :
      (t.final && !unlocked) ? `Sealed — needs ${need} provinces broken (${conqueredCount()}/${need})` :
      `Garrison ${t.garrison}`;
    return `<div class="${cls.join(' ')}">
      <div class="t-name-row"><span class="t-sigil">${t.sigil||''}</span><span class="t-name">${t.name}</span></div>
      <div class="t-meta"><span>${t.owner}</span><span>${status}</span></div>
      <div class="t-desc">${t.desc}</div>
    </div>`;
  }).join('');
}

function renderQuests(){
  const el=document.getElementById('questList');
  const need=4;
  const cc=conqueredCount();
  const items=[];

  if(cc<need){
    const remaining=state.territories.filter(t=>!t.conquered && !t.final);
    const names=remaining.map(t=>t.name).join(', ');
    items.push({
      cls:'main',
      label:`Break ${need} of the six provinces to shatter the Hollow King's wards over the Ember Wastes`,
      sub:`Progress: ${cc} / ${need} broken — still standing: ${names}`
    });
  } else {
    const ember=state.territories.find(t=>t.id==='emberwastes');
    items.push({
      cls:'main',
      label:`March on the Ember Wastes and end the Hollow King's reign (garrison ${ember.garrison})`,
      sub:`The wards are broken — the path to the capital is open.`
    });
  }

  state.territories.filter(t=>!t.final).forEach(t=>{
    items.push({
      cls: t.conquered ? 'done' : '',
      label:`Break ${t.name}, held by ${t.owner}`,
      sub: t.conquered ? 'Held by you' : `March or Parley — garrison ${t.garrison}`
    });
  });

  if(state.grain<15){
    items.push({cls:'warning', label:'Grain is running low — Forage & Trade, or capture farmland.', sub:'Watch your stores'});
  }
  if(state.faith<25){
    items.push({cls:'warning', label:'Faith is faltering — choose events and actions that lift it before it collapses.', sub:'Watch your people'});
  }
  if(state.corruption>60){
    items.push({cls:'warning', label:'Corruption is spreading — dark choices now risk a far darker ending.', sub:'Watch your soul'});
  }
  if(state.soldiers<10){
    items.push({cls:'warning', label:'Your army is thin — Levy Troops or Hold Vigil before marching anywhere.', sub:'Watch your ranks'});
  }

  el.innerHTML=items.map(q=>`
    <div class="quest-item ${q.cls}">
      <span class="quest-label">${q.label}</span>
      <span class="quest-sub">${q.sub}</span>
    </div>
  `).join('');
}

function renderEvent(){
  const ev=state.currentEvent;
  const ch=charFor(ev.speaker);
  const el=document.getElementById('eventCard');
  el.style.setProperty('--char-color', ch.color);
  el.innerHTML=`
    <div class="speaker-row">
      <div class="speaker-sigil">${ch.sigil}</div>
      <div class="speaker-meta">
        <span class="speaker-name">${ev.speaker}</span>
        <span class="speaker-role">${ch.role||''}</span>
      </div>
    </div>
    <h3>${ev.title}</h3>
    <p class="event-text">${ev.text.replace(/\n/g,'<br><br>')}</p>
    <div class="choice-list" id="choiceList"></div>
  `;
  const list=el.querySelector('#choiceList');
  ev.choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=c.label;
    btn.onclick=()=>{
      const result=c.run(state);
      clampAll();
      addLog(`${ev.title}: ${result}`);
      state.eventResult=result;
      state.phase='resolved';
      render();
    };
    list.appendChild(btn);
  });
}

function renderResolvedEvent(){
  const ev=state.currentEvent;
  const ch=charFor(ev.speaker);
  const el=document.getElementById('eventCard');
  el.style.setProperty('--char-color', ch.color);
  el.innerHTML=`
    <div class="speaker-row">
      <div class="speaker-sigil">${ch.sigil}</div>
      <div class="speaker-meta">
        <span class="speaker-name">${ev.speaker}</span>
        <span class="speaker-role">${ch.role||''}</span>
      </div>
    </div>
    <h3>${ev.title}</h3>
    <p class="event-text">${ev.text.replace(/\n/g,'<br><br>')}</p>
    <div class="result-text">${state.eventResult}</div>
  `;
}

function renderActivities(){
  const el=document.getElementById('activityGrid');
  el.innerHTML=Object.entries(SIDE_ACTIVITIES).map(([key,a])=>`
    <button class="activity-card" data-key="${key}">
      <div class="activity-title">${a.icon} ${a.label}</div>
      <div class="activity-desc">${a.desc}</div>
    </button>
  `).join('');
  el.querySelectorAll('.activity-card').forEach(btn=>{
    btn.onclick=()=>{
      const key=btn.getAttribute('data-key');
      const activity=SIDE_ACTIVITIES[key];
      const result=activity.run(state);
      clampAll();
      addLog(`${activity.label}: ${result}`);
      render();
    };
  });
}

function renderActions(){
  const el=document.getElementById('actionsGrid');

  const targets=state.territories.filter(t=>{
    if(t.conquered) return false;
    if(t.final && conqueredCount()<4) return false;
    return true;
  });
  const options=targets.map(t=>`<option value="${t.id}">${t.name} (garrison ${t.garrison})</option>`).join('');
  const gateNote = conqueredCount()<4
    ? `<div class="gate-note">The Ember Wastes remain sealed until 4 other provinces are broken (${conqueredCount()}/4).</div>` : '';

  el.innerHTML=`
    <button class="action-btn" id="btnLevy">Levy Troops
      <small>Cost: 25 gold → +5 soldiers, -2 faith</small>
    </button>
    <button class="action-btn" id="btnForage">Forage &amp; Trade
      <small>+10 grain, +4 gold</small>
    </button>
    <button class="action-btn" id="btnFortify">Fortify the Hold
      <small>Cost: 15 gold → +3 faith</small>
    </button>
    <button class="action-btn" id="btnRest">Hold Vigil &amp; Rest
      <small>+6 faith, +2 soldiers</small>
    </button>
    <div style="grid-column:1/-1;">
      <div class="target-row">
        <select id="targetSelect">${options}</select>
        <button class="action-btn" id="btnMarch">March</button>
        <button class="action-btn" id="btnParley">Parley</button>
      </div>
      ${gateNote}
    </div>
  `;

  document.getElementById('btnLevy').disabled = state.gold<25;
  document.getElementById('btnFortify').disabled = state.gold<15;

  document.getElementById('btnLevy').onclick=()=>doAction(actionLevy);
  document.getElementById('btnForage').onclick=()=>doAction(actionForage);
  document.getElementById('btnFortify').onclick=()=>doAction(actionFortify);
  document.getElementById('btnRest').onclick=()=>doAction(actionRest);

  document.getElementById('btnMarch').onclick=()=>{
    const tid=document.getElementById('targetSelect').value;
    startTravelSequence(tid, 'march');
  };
  document.getElementById('btnParley').onclick=()=>{
    const tid=document.getElementById('targetSelect').value;
    startTravelSequence(tid, 'parley');
  };

  if(targets.length===0){
    document.getElementById('btnMarch').disabled=true;
    document.getElementById('btnParley').disabled=true;
  }
}

function renderChronicle(){
  const el=document.getElementById('chronicle');
  if(state.log.length===0){
    el.innerHTML=`<div class="entry">The chronicle is empty. History has not yet been written.</div>`;
    return;
  }
  el.innerHTML=state.log.slice(0,40).map(e=>
    `<div class="entry"><span class="turn-mark">T${e.turn}</span>${e.text}</div>`
  ).join('');
}

/* =====================================================
   ACTIONS
   ===================================================== */

function actionLevy(s){
  if(s.gold<25) return {text:"Korrath shakes her head. 'No coin, no swords, my lord. That's how it's always worked.'"};
  s.gold-=25; s.soldiers+=5; s.faith-=2;
  return {text:"New levies march into Ashveil Hold's yard, frightened and unready — but they are soldiers now."};
}
function actionForage(s){
  s.grain+=10; s.gold+=4;
  return {text:"Foraging parties and quiet trade with neighboring hamlets bring in supplies."};
}
function actionFortify(s){
  if(s.gold<15) return {text:"There's not enough coin in the treasury to so much as buy nails, let alone fortify the walls."};
  s.gold-=15; s.faith+=3;
  return {text:"Masons reinforce Ashveil Hold's old walls through the night. The garrison sleeps a little easier."};
}
function actionRest(s){
  s.faith+=6; s.soldiers+=2;
  return {text:"A day of rest. Stragglers and deserters trickle back to the banner, and the camp's mood lightens."};
}

function march(s,tid){
  const t=s.territories.find(x=>x.id===tid);
  const committed=Math.floor(s.soldiers*0.6);
  if(committed<3){
    return {text:"General Korrath refuses outright: 'We don't have enough men to march anywhere, my lord. Not yet.'"};
  }
  let atk=committed*(0.8+Math.random()*0.4);
  const def=t.garrison*(0.8+Math.random()*0.4);

  let gateNote='';
  if(tid==='brackenfort' && s.flags.brackenfortWeak){
    atk*=1.25;
    delete s.flags.brackenfortWeak;
    gateNote=" The bribed gate holds true — your attack strikes harder than the defenders expect.";
  }

  if(atk>def){
    const losses=Math.round(committed*(def/atk)*0.5);
    s.soldiers-=losses;

    if(t.final){
      s.victory=true;
      return {text:"The Hollow King's wards shatter like cheap glass. Your soldiers pour into the Ember Wastes as the violet fire ahead rears up to meet you."};
    }

    t.conquered=true; t.garrison=0; s.gold+=15;
    s.priorityQueue.unshift(t.id+'Aftermath');
    return {text:`${CONQUER_TEXT[tid]}${gateNote} (-${losses} soldiers, +15 gold)`};
  } else {
    const losses=Math.round(committed*0.7);
    s.soldiers-=losses;
    s.faith-=5;
    const floor = t.final ? 15 : 2;
    t.garrison=Math.max(floor,Math.round(t.garrison-atk*0.3));
    return {text:`${DEFEAT_TEXT[tid]}${gateNote} (-${losses} soldiers, -5 faith)`};
  }
}

function parley(s,tid){
  const t=s.territories.find(x=>x.id===tid);
  if(t.final) return {text:"Brother Ilun shakes his head slowly. 'There is no parley with what waits in the Ember Wastes. Only an ending.'"};
  if(s.gold<15 || s.faith<5) return {text:"Seris spreads her hands. 'We've neither the coin nor the standing to even open talks, my lord.'"};
  s.gold-=15; s.faith-=5;
  const friendly=['Bandit Lords','The Free Company','The Drowned Fleet'];
  let chance=friendly.includes(t.owner)?0.6:0.25;
  if(s.flags.serisTrustNetwork) chance+=0.1;
  if(Math.random()<chance){
    t.conquered=true; t.garrison=0;
    s.priorityQueue.unshift(t.id+'Aftermath');
    return {text:`Envoys return with banners lowered: ${t.name} bends the knee without a drop of blood spilled.`};
  } else {
    t.garrison+=1;
    return {text:`The talks collapse before they truly begin. ${t.owner} doubles its watch along the border. (-15 gold, -5 faith)`};
  }
}


/* ===================== TRAVEL SEQUENCE ===================== */

function startTravelSequence(tid, mode){
  const t=state.territories.find(x=>x.id===tid);
  const totalDays=t.travelDays||2;
  const travel={
    tid, mode, totalDays,
    day:0,
    encounterDay: 1+Math.floor(Math.random()*Math.max(1,totalDays-1)),
    encounterShown:false,
    encounterIndex: Math.floor(Math.random()*TRAVEL_ENCOUNTERS.length)
  };
  state.travel=travel;
  renderTravelStep();
  document.getElementById('travelOverlay').classList.remove('hidden');
}

function renderTravelStep(){
  const travel=state.travel;
  const t=state.territories.find(x=>x.id===travel.tid);
  const box=document.getElementById('travelBox');
  const pct=Math.round((travel.day/travel.totalDays)*100);
  const modeLabel = travel.mode==='march' ? 'Marching toward' : 'Riding toward';

  box.innerHTML=`
    <div class="travel-meta">${modeLabel} ${t.sigil} ${t.name}</div>
    <h2>The Road to ${t.name}</h2>
    <div class="travel-progress-track"><div class="travel-progress-fill" style="width:${pct}%"></div></div>
    <div class="travel-days-label"><span>Ashveil Hold</span><span>Day ${travel.day} of ${travel.totalDays}</span><span>${t.name}</span></div>
    <div id="travelStepBody"></div>
  `;

  const body=document.getElementById('travelStepBody');

  if(travel.day===0){
    body.innerHTML=`
      <p class="travel-text">The column forms up at first light — banners, supply carts, and the particular quiet of soldiers who don't yet know what's waiting for them.</p>
      <div class="glossary-close-row"><button class="big-btn" id="travelNextBtn">Set Out</button></div>
    `;
    document.getElementById('travelNextBtn').onclick=advanceTravel;
    return;
  }

  if(travel.day===travel.encounterDay && !travel.encounterShown){
    const enc=TRAVEL_ENCOUNTERS[travel.encounterIndex];
    body.innerHTML=`
      <p class="travel-text">${enc.text}</p>
      <div class="choice-list" id="travelChoices"></div>
    `;
    const list=document.getElementById('travelChoices');
    enc.choices.forEach(c=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.textContent=c.label;
      btn.onclick=()=>{
        const result=c.run(state);
        clampAll();
        travel.encounterShown=true;
        body.innerHTML=`<p class="travel-text">${enc.text}</p><div class="travel-result">${result}</div><div class="glossary-close-row"><button class="big-btn" id="travelNextBtn">Continue</button></div>`;
        document.getElementById('travelNextBtn').onclick=advanceTravel;
      };
      list.appendChild(btn);
    });
    return;
  }

  if(travel.day>=travel.totalDays){
    const arrivalLine = travel.mode==='march'
      ? "time to see whose banners are still standing by nightfall."
      : "time to see if words will do what swords don't have to.";
    body.innerHTML=`
      <p class="travel-text">${t.sigil} ${t.name} rises into view on the horizon at last — ${arrivalLine}</p>
      <div class="glossary-close-row"><button class="big-btn" id="travelArriveBtn">Arrive</button></div>
    `;
    document.getElementById('travelArriveBtn').onclick=resolveTravelArrival;
    return;
  }

  body.innerHTML=`
    <p class="travel-text">The column presses on. Another day's march behind you, the road ahead still long.</p>
    <div class="glossary-close-row"><button class="big-btn" id="travelNextBtn">Continue</button></div>
  `;
  document.getElementById('travelNextBtn').onclick=advanceTravel;
}

function advanceTravel(){
  state.travel.day+=1;
  renderTravelStep();
}

function resolveTravelArrival(){
  const travel=state.travel;
  document.getElementById('travelOverlay').classList.add('hidden');
  state.travel=null;
  if(travel.mode==='march'){
    doAction(s=>march(s, travel.tid));
  } else {
    doAction(s=>parley(s, travel.tid));
  }
}

function doAction(fn){
  const result=fn(state);
  clampAll();
  addLog(result.text);

  if(state.victory){
    showEnding(victoryEnding());
    return;
  }

  upkeep();

  const endKey=checkEndings();
  if(endKey){
    showEnding(endKey);
    return;
  }

  state.turn+=1;
  if(state.turn>30){
    showEnding('longwinter');
    return;
  }

  drawEvent();
  state.phase='event';
  render();
}

function upkeep(){
  const consumption=Math.ceil(state.soldiers/6);
  state.grain-=consumption;
  if(state.grain<0){
    const deserters=Math.min(state.soldiers, Math.abs(state.grain)*2);
    state.soldiers-=deserters;
    state.faith-=8;
    state.grain=0;
    addLog(`Starvation stalks the camp. ${deserters} soldiers slip away into the night.`);
  }

  state.territories.forEach(t=>{
    if(t.conquered){
      state.gold+=t.goldInc;
      state.grain+=t.grainInc;
    }
  });

  if(state.corruption>50){
    let chance=(state.corruption-50)/100;
    if(state.flags.wardProtected) chance*=0.5;
    if(Math.random()<chance){
      const dmg=3+Math.floor(Math.random()*4);
      state.soldiers=Math.max(0,state.soldiers-dmg);
      state.gold=Math.max(0,state.gold-5);
      state.faith-=4;
      addLog(`Hollow-touched raiders strike at Ashveil's outer walls in the night. (-${dmg} soldiers, -5 gold, -4 faith)`);
    }
  }

  clampAll();
}

function victoryEnding(){
  if(state.corruption<35) return 'dawn';
  if(state.corruption<=65) return 'ashking';
  return 'hollowking';
}

function checkEndings(){
  if(state.corruption>=100) return 'hollowcrown';
  if(state.soldiers<=0) return 'lastbanner';
  if(state.faith<=0) return 'despair';
  return null;
}

/* =====================================================
   GAME FLOW
   ===================================================== */

function drawEvent(){
  // 1. Priority queue: direct consequences of earlier choices, shown first.
  while(state.priorityQueue.length>0){
    const id=state.priorityQueue.shift();
    if(!state.seen.has(id) && EVENTS_BY_ID[id]){
      state.currentEvent=EVENTS_BY_ID[id];
      state.seen.add(id);
      return;
    }
  }

  // 2. Generic pool, reshuffled when empty, skipping any whose condition no longer holds.
  let guard=0;
  while(guard<50){
    guard++;
    if(state.eventPool.length===0){
      state.eventPool=shuffle(genericEventIds());
    }
    const id=state.eventPool.pop();
    const ev=EVENTS_BY_ID[id];
    if(ev.condition && !ev.condition(state)) continue;
    state.currentEvent=ev;
    state.seen.add(id);
    return;
  }

  // 3. Fallback (should not normally happen).
  state.currentEvent=EVENTS_BY_ID['merchantCaravan'];
}

function showEnding(key){
  const ending=ENDINGS[key];
  const box=document.getElementById('overlayBox');
  box.innerHTML=`
    <div class="eyebrow">${ending.eyebrow}</div>
    <h2>${ending.title}</h2>
    <p>${ending.text.replace(/\n\n/g,'</p><p>')}</p>
    <p style="color:var(--text-dim); font-size:14px;">Reached on turn ${state.turn}, with ${state.corruption} corruption and ${conqueredCount()} provinces broken.</p>
    <button class="big-btn" id="restartBtn">Begin Anew</button>
  `;
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('restartBtn').onclick=startGame;
}

function renderGlossaryList(filter){
  const el=document.getElementById('glossaryList');
  const q=filter.trim().toLowerCase();
  const items=GLOSSARY.filter(g=>!q || g.term.toLowerCase().includes(q) || g.def.toLowerCase().includes(q));
  if(items.length===0){
    el.innerHTML=`<div class="glossary-empty">No words found matching "${filter}". Try a shorter search, like "faith" or "march".</div>`;
    return;
  }
  el.innerHTML=items.map(g=>`
    <div class="glossary-item">
      <div class="glossary-term">${g.term}</div>
      <div class="glossary-def">${g.def}</div>
    </div>
  `).join('');
}

function setupGlossary(){
  const btn=document.getElementById('glossaryBtn');
  const overlay=document.getElementById('glossaryOverlay');
  const closeBtn=document.getElementById('glossaryCloseBtn');
  const search=document.getElementById('glossarySearch');

  btn.onclick=()=>{
    renderGlossaryList('');
    search.value='';
    overlay.classList.remove('hidden');
    search.focus();
  };
  closeBtn.onclick=()=>{
    overlay.classList.add('hidden');
  };
  overlay.onclick=(e)=>{
    if(e.target===overlay) overlay.classList.add('hidden');
  };
  search.oninput=()=>{
    renderGlossaryList(search.value);
  };
}

function showIntro(){
  const box=document.getElementById('overlayBox');
  box.innerHTML=`
    <div class="eyebrow">${INTRO.eyebrow}</div>
    <h2>${INTRO.title}</h2>
    <p>${INTRO.text.replace(/\n\n/g,'</p><p>')}</p>
    <button class="big-btn" id="beginBtn">Take Up the Ember Crown</button>
  `;
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('beginBtn').onclick=()=>{
    document.getElementById('overlay').classList.add('hidden');
    state=freshState();
    drawEvent();
    render();
  };
}

function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  state=freshState();
  drawEvent();
  render();
}

setupGlossary();
showIntro();
</script>
</body>
</html>
